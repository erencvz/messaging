name: CI

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/YOUR_ORG/messaging-api

jobs:
  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v

  # ── 2. Build & Push ────────────────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test   # test geçmeden build başlamaz
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: vars
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ steps.vars.outputs.SHORT_SHA }}
            BUILD_SHA=${{ steps.vars.outputs.SHORT_SHA }}
          tags: |
            ${{ env.IMAGE_NAME }}:sha-${{ steps.vars.outputs.SHORT_SHA }}
            ${{ env.IMAGE_NAME }}:latest

      # ── Jenkins Remote Trigger ──────────────────────────────────────────────
      - name: Trigger Jenkins deploy pipeline
        run: |
          curl -f -X POST \
            "${{ secrets.JENKINS_URL }}/job/YOUR_REPO/buildWithParameters" \
            --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}" \
            --data-urlencode "SHA_TAG=sha-${{ steps.vars.outputs.SHORT_SHA }}"
