apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: messaging-test

resources:
  - ../../base
patches:
  - path: service-patch.yaml
configMapGenerator:
  - name: messaging-api-env
    literals:
      - ENVIRONMENT=test

images:
  - name: apinizeren/messaging
    newTag: latest
